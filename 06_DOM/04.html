<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
</head>
<body style="background-color: #212121 ; color:white;">
    
    
</body>
<script>
    const div = document.createElement('div')
    console.log(div);

    div.className="main"
    div.id = Math.round(Math.random() * 10 + 1)

    div.setAttribute("title","generated title")
    div.style.backgroundColor="green"
    div.style.padding="12px"
    // div.innerHTML = "Ansh Patel"
    
    const addTextToDiv = document.createTextNode("Ansh Patel")
    div.appendChild(addTextToDiv)

    document.body.appendChild(div)

    //We can wrap the Entire Upside Thing in a Function and we can pass the Colour and all As Parameters and Do the Thing 
    // The main Logic is as Above  // Thats Enough

    

</script>
</html>
