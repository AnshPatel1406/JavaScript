<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
</head>
<body style="background-color: #212121; color:white;">
    
    <ul class="language">

        <li>JavaScript</li>


    </ul>
</body>
<script>

    function addLanguage(langName) {
        const li = document.createElement('li')
        li.innerHTML=`${langName}`
        document.querySelector('.language').appendChild(li)


    }
    addLanguage("Python") // Adds it to the List
    addLanguage("Java")
    // when we use InnerHTML it traverses  
    // the Above Way is not Optimized for Large Number of Insertion as the tree need to traverse to bottom every time
    // Optimized Way here
    // use appendChild as it is the Optimized way dont used innerHTML
    function addOptiLang(langName) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }

    addOptiLang('GoLang')
    addOptiLang('GoLang')
    addOptiLang('GoLang')


    // Edit Values

    const secondLang = document.querySelector("li:nth-child(2)")
    //secondLang.innerHTML = "MOJO" // UN Optimized

    const newLi = document.createElement('li')
    newLi.textContent = "Mojo" // is same as InnerHTML // But There is very Slight Diffrence
    secondLang.replaceWith(newLi)

    // Edit

    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>TypeScript</li>'

    // Remove 

    const lastLang = document.querySelector("li:nth-child(3)") // removes a specific value that is selected using queryselector
    lastLang.remove()

    




</script>
</html>
